baseURL = "https://slowlookshop.github.io/"
languageCode = "ko-kr"
title = "slowlookshop 쇼핑 블로그"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
summaryLength = 35

[pagination]
pagerSize = 12

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
	[markup.goldmark]
		[markup.goldmark.renderer]
			unsafe = true

[minify]
disableXML = false
minifyOutput = true

[sitemap]
changefreq = "daily"
priority = 0.7
filename = "sitemap.xml"

[permalinks]
posts = "/posts/:slug/"

[params]
defaultTheme = "auto"
disableThemeToggle = false
ShowShareButtons = true
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
env = "production"
description = "실용적인 주방, 욕실, 수납용품을 중심으로 한 생활 쇼핑 전문 블로그입니다. 합리적인 가격과 품질을 갖춘 다양한 홈리빙 아이템을 소개합니다."
keywords = ["주방용품", "욕실용품", "수납", "생활쇼핑", "홈리빙", "실용아이템"]
images = ["/images/og-default.webp"]

# Search engine verification (set only when needed)
googleSiteVerification = "wYI691jLJJcCGDUHEKLHiMCiG6RGFSbe9-rfyCSjioQ"
naverSiteVerification = "17feb5c9b1779382e1dbd039cf495a5164a1ff9c"
bingSiteVerification = ""
yandexSiteVerification = ""

[params.homeInfoParams]
Title = "생활을 바꾸는 실용 쇼핑, 슬로우룩샵"
Content = "슬로우룩샵에서는 주방, 욕실, 수납 등 집안 곳곳에 필요한 실용적인 생활용품을 엄선해 소개합니다. 합리적인 가격과 높은 품질의 아이템으로 일상을 더욱 편리하게 만들어보세요. 매일 새로운 상품과 생활 꿀팁을 만나실 수 있습니다."

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 5

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "categories"
name = "Categories"
url = "/categories/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 30
